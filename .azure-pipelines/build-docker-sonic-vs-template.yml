parameters:
- name: arch
  type: string
  values:
  - amd64
  - armhf
  - arm64
  default: amd64

- name: timeout
  type: number
  default: 60

- name: swss_artifact_name
  type: string

- name: sairedis_artifact_name
  type: string

- name: swss_common_artifact_name
  type: string

- name: artifact_name
  type: string

- name: asan
  type: boolean
  default: false

jobs:
- job:
  displayName: ${{ parameters.arch }}
  timeoutInMinutes: ${{ parameters.timeout }}

  pool:
    vmImage: 'ubuntu-22.04'

  steps:
  - checkout: self
    clean: true
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-swss-common
      artifact: ${{ parameters.swss_common_artifact_name }}
      path: $(Build.ArtifactStagingDirectory)/download
      runVersion: 'latestFromBranch'
      # TEMPORARY (PoC): resolve the swss-common cascade artifact from lawlee/ci-unify.
      # BUILD_BRANCH = Build.SourceBranchName = "ci-unify" (last ref segment only), which
      # can't find the lawlee/ci-unify run. Restore refs/heads/$(BUILD_BRANCH) before merge.
      runBranch: 'refs/heads/lawlee/ci-unify'
      allowPartiallySucceededBuilds: true
    displayName: "Download sonic swss common deb packages"
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: ${{ parameters.sairedis_artifact_name }}
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download sonic sairedis deb packages"
  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: ${{ parameters.swss_artifact_name }}
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download sonic swss artifact"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      artifact: common-lib
      runVersion: 'latestFromBranch'
      # TEMPORARY (PoC): pin to refs/heads/master; the common_libs pipeline has no
      # lawlee/ci-unify branch. Restore refs/heads/$(BUILD_BRANCH) before merge.
      runBranch: 'refs/heads/master'
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: '**/target/debs/*/libnexthopgroup_*.deb'
    displayName: "Download sonic-buildimage libnexthopgroup package"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.official.vs
      artifact: sonic-buildimage.vs
      # Temporarily pin to build 1141167 (20260617.1, commit f1d42c1a), the last
      # master sonic-buildimage build before PR #26724 renamed the docker-sonic-vs
      # supervisor program start.sh -> start and broke DVS readiness in vs tests.
      # Revert to latestFromBranch once the upstream issue is resolved.
      runVersion: 'specific'
      runId: 1141167
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: '**/target/${{ parameters.artifact_name }}.gz'
    displayName: "Download sonic-buildimage ${{ parameters.artifact_name }}"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: sonic-net.sonic-dash-api
      ${{ if eq(parameters.arch, 'amd64') }}:
        artifact: sonic-dash-api
      ${{ else }}:
        artifact: sonic-dash-api.${{ parameters.arch }}
      runVersion: 'latestFromBranch'
      # TEMPORARY (PoC): pin to refs/heads/master; sonic-dash-api has no
      # lawlee/ci-unify branch. Restore refs/heads/$(BUILD_BRANCH) before merge.
      runBranch: 'refs/heads/master'
      path: $(Build.ArtifactStagingDirectory)/download
      patterns: |
        libdashapi*.deb
    displayName: "Download dash api"
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: sonic-net.sonic-platform-vpp
      artifact: vpp-bookworm
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/master'
      allowPartiallySucceededBuilds: true
      path: $(Build.ArtifactStagingDirectory)/download
    displayName: "Download sonic platform-vpp deb packages"
    condition: eq('${{ parameters.arch }}', 'amd64')
  - script: |
      set -ex
      echo $(Build.DefinitionName).$(Build.BuildNumber)

      docker load < $(Build.ArtifactStagingDirectory)/download/target/${{ parameters.artifact_name }}.gz

      mkdir -p .azure-pipelines/docker-sonic-vs/debs

      cp -v $(Build.ArtifactStagingDirectory)/download/*.deb .azure-pipelines/docker-sonic-vs/debs
      find $(Build.ArtifactStagingDirectory)/download -name 'libnexthopgroup_*.deb' -exec cp "{}" .azure-pipelines/docker-sonic-vs/debs \;

      pushd .azure-pipelines

      build_args=""
      if [ '${{ parameters.asan }}' == True ]; then
        build_args="--build-arg need_dbg=y"
      fi

      docker build $build_args --no-cache -t docker-sonic-vs:$(Build.DefinitionName).$(Build.BuildNumber).asan-${{ parameters.asan }} docker-sonic-vs

      popd

      docker save docker-sonic-vs:$(Build.DefinitionName).$(Build.BuildNumber).asan-${{ parameters.asan }} | gzip -c > $(Build.ArtifactStagingDirectory)/docker-sonic-vs.gz
      rm -rf $(Build.ArtifactStagingDirectory)/download
    displayName: "Build ${{ parameters.artifact_name }}"

  - publish: $(Build.ArtifactStagingDirectory)/
    artifact: ${{ parameters.artifact_name }}
    displayName: "Archive sonic docker vs image"

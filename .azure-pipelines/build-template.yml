parameters:
- name: repo
  type: string
  default: self
- name: arch
  type: string
  values:
  - amd64
  - armhf
  - arm64

- name: pool
  type: string
  values:
  - sonicso1ES-amd64
  - sonicso1ES-arm64
  - sonicso1ES-armhf
  - default
  default: default

- name: timeout
  type: number
  default: 60

- name: swss_common_artifact_name
  type: string

- name: artifact_name
  type: string

- name: syslog_artifact_name
  type: string

- name: run_unit_test
  type: boolean
  default: false

- name: archive_gcov
  type: boolean
  default: false

- name: asan
  type: boolean
  default: false

- name: stage_swss_common
  type: boolean
  default: false

- name: debian_version
  type: string

jobs:
- job:
  displayName: ${{ parameters.arch }}
  timeoutInMinutes: ${{ parameters.timeout }}
  variables:
    DIFF_COVER_CHECK_THRESHOLD: 80
    ${{ if eq(parameters.run_unit_test, true) }}:
      DIFF_COVER_ENABLE: 'true'
    # When a consumer stages the current-run swss-common (stage_swss_common),
    # require the cascade to use it rather than silently falling back to a download.
    ${{ if eq(parameters.stage_swss_common, true) }}:
      REQUIRE_STAGED: '--required-staged-upstream sonic-swss-common'
    ${{ else }}:
      REQUIRE_STAGED: ''

  pool:
    ${{ if ne(parameters.pool, 'default') }}:
      name: ${{ parameters.pool }}
    ${{ else }}:
      vmImage: 'ubuntu-22.04'

  container:
    # TEMPORARY (PoC): pin the sonic-slave image tag to `master` instead of
    # $(BUILD_BRANCH). Only master-tagged slave images are published; the
    # lawlee/ci-unify feature branch has no image. Restore $(BUILD_BRANCH) before merge.
    image: sonicdev-microsoft.azurecr.io:443/sonic-slave-${{ parameters.debian_version }}:master-${{ parameters.arch }}
    options:  "--privileged"

  steps:
  # `repo` lets a consumer pipeline (e.g. sonic-swss-common) reuse this template to
  # build sonic-sairedis. Default `self` preserves sairedis's own pipeline. When
  # overridden with the sonic-sairedis repository resource, check out to `s` so
  # $(Build.SourcesDirectory) still points at the sairedis checkout as usual.
  - checkout: ${{ parameters.repo }}
    clean: true
    submodules: true
    ${{ if ne(parameters.repo, 'self') }}:
      path: s
  - ${{ if ne(parameters.repo, 'self') }}:
    - script: |
        set -e
        # Branch-match the reused resource repo to the source repo being built
        # ($(BUILD_BRANCH)). Only for the reuse path (repo != self): sairedis's own
        # checkout is already on the right ref, and a self PR build is on the merge
        # ref which must NOT be switched. Fall back to the checked-out ref if that
        # branch doesn't exist here (e.g. a PoC feature branch, or BUILD_BRANCH being
        # the truncated last ref segment).
        git checkout $(BUILD_BRANCH) 2>/dev/null && git submodule update || \
          echo "keeping checked-out ref $(git rev-parse --abbrev-ref HEAD)"
      displayName: "Branch-match ${{ parameters.repo }} to $(BUILD_BRANCH)"
  - ${{ if eq(parameters.stage_swss_common, true) }}:
    - task: DownloadPipelineArtifact@2
      inputs:
        artifact: ${{ parameters.swss_common_artifact_name }}
        path: $(Pipeline.Workspace)/staged/sonic-swss-common
      displayName: "Stage current-run sonic-swss-common for the cascade"
  - script: |
      set -ex
      # Bootstrap the tool's own runtime deps (buildenv_setup needs PyYAML + requests).
      sudo apt-get update
      sudo apt-get install -qq -y python3-yaml python3-requests git
      # buildenv_setup lives in sonic-swss-common/ci/; sonic-sairedis is a consumer,
      # so clone sonic-swss-common to obtain the tool.
      # TEMPORARY (PoC): pin to lawlee/ci-unify (the tool isn't on swss-common master
      # yet). Once merged, clone $(BUILD_BRANCH) with a default-branch fallback.
      git clone --depth 1 --branch lawlee/ci-unify \
        https://github.com/sonic-net/sonic-swss-common /tmp/sw-common
      # Sets up apt/pip deps + downloads/installs libswsscommon, libnl, libyang3 and
      # vpp DEBs (see build-env/upstream-artifacts.yaml), and runs the redis /
      # sswsyncd / rsyslog post-install hooks.
      # --upstream-staged-dir lets a consumer (sonic-swss-common) supply the
      # current-run swss-common bundle at <dir>/sonic-swss-common/, so the cascade
      # uses THIS run's swss-common instead of the latest completed external run.
      # When that dir is absent (sairedis's own pipeline), buildenv_setup falls back
      # to downloading; REQUIRE_STAGED enforces the override in the consumer case.
      PYTHONPATH=/tmp/sw-common/ci python3 -m buildenv_setup \
        --repo-dir $(Build.SourcesDirectory) \
        --scope build \
        --arch ${{ parameters.arch }} \
        --debian-version ${{ parameters.debian_version }} \
        --branch $(BUILD_BRANCH) \
        --upstream-staged-dir $(Pipeline.Workspace)/staged $(REQUIRE_STAGED)
    displayName: "Set up build environment (buildenv_setup)"
    env:
      SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  - script: ASAN=${{ parameters.asan }} ./build-env/build.sh
    displayName: "Compile sonic sairedis with coverage enabled"
  - script: |
      set -ex
      sudo cp azsyslog.conf /etc/rsyslog.conf
      cat /run/rsyslogd.pid
      sudo pkill -F /run/rsyslogd.pid
      # Looks like arm64 (and sometimes amd64) rsyslogd needs some time to exit
      sleep 2
      ps -ef
      sudo rsyslogd
    displayName: "Update rsyslog.conf"
  - ${{ if eq(parameters.run_unit_test, true) }}:
    - script: |
        set -ex
        # Add SYS_TIME capability for settimeofday ok in syncd test
        sudo setcap "cap_sys_time=eip" syncd/.libs/syncd_tests
        # Add CAP_DAC_OVERRIDE capability for system directory creation in syncd unittest
        sudo setcap "cap_dac_override,cap_ipc_lock,cap_ipc_owner,cap_sys_time=eip" unittest/syncd/.libs/tests
        make check
        gcovr --version
        find SAI/meta -name "*.gc*" -print -delete
        find -name 'libswsscommon_la*.gcda' -print -delete
        gcov_dirs=$(find . -path "*.libs*gcda" | xargs dirname | sort -u |  cut -c"3-")
        for dir in ${gcov_dirs}; do
          source_dir=$(dirname $dir)
          output_file=$(echo "coverage-$source_dir.json"| tr '/' '-')
          gcovr --exclude-unreachable-branches --json-pretty -o $output_file --object-directory $source_dir $dir
        done
        gcovr -r ./ -e ".*/SAI/.*" -e ".+/json.hpp" -e "swss/.+" -e ".*/.libs/.*" -e ".*/debian/.*" -e "vslib/vpp/.*" --exclude-unreachable-branches --json-pretty -o coverage-all.json
        gcovr -a "coverage-*.json" -x --xml-pretty -o coverage.xml
      displayName: "Run sonic sairedis unit tests"
  - publish: $(System.DefaultWorkingDirectory)/
    artifact: ${{ parameters.artifact_name }}
    displayName: "Archive sonic sairedis debian packages"
  - ${{ if eq(parameters.archive_gcov, true) }}:
      - script: |
          set -ex
          # Install .NET CORE
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          sudo apt-add-repository https://packages.microsoft.com/debian/12/prod
          sudo apt-get update
          sudo apt-get install -y dotnet-sdk-8.0
        displayName: "Install .NET CORE"
      - task: PublishCodeCoverageResults@1
        inputs:
            codeCoverageTool: Cobertura
            summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
        displayName: 'Publish test coverage'
  - script: |
      pwd
      sudo chmod a+r /var/log/syslog*
      tar -czf syslog-all.tgz /var/log/syslog*
      ls -al .
      ls -al /var/log/
    displayName: "Env info"
    condition: always()
  - task: CopyFiles@2
    displayName: "Copy syslog to staging directory"
    condition: always()
    inputs:
        contents: 'syslog-all.tgz'
        targetFolder: $(Build.ArtifactStagingDirectory)
  - publish: $(Build.ArtifactStagingDirectory)/
    artifact: ${{ parameters.syslog_artifact_name }}@$(System.JobAttempt)
    displayName: "Publish syslog artifacts"
    condition: always()
